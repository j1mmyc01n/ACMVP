[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[dev]
  framework = "vite"
  targetPort = 5173

# SPA fallback — react-router handles routes client-side
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Role-based admin gate (requires Identity nf_jwt cookie). master_admin is
# the platform sysadmin; super_admin is a location's senior admin.
[[redirects]]
  from = "/system/*"
  to = "/system/:splat"
  status = 200
  conditions = { Role = ["master_admin"] }

[[redirects]]
  from = "/system/*"
  to = "/login"
  status = 302

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  conditions = { Role = ["admin", "super_admin", "master_admin"] }

[[redirects]]
  from = "/admin/*"
  to = "/login"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
