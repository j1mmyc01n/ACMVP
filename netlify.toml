# netlify.toml
# Fixes the /checkin 404 on page reload — React SPA routing

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA catch-all redirect — CRITICAL for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

# Cache hashed assets forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Markdown-for-AI Edge Function ─────────────────────────────────────────────
# These paths serve Markdown when the request includes `Accept: text/markdown`.
# Anything else (regular browser, JSON API client, asset request) is passed
# through to the origin unchanged. To extend coverage, add another
# `[[edge_functions]]` block below with the desired path. To remove a route,
# delete its block or add the path to `EXCLUDED_PATHS` in the edge function.
[[edge_functions]]
  path = "/"
  function = "markdown"

[[edge_functions]]
  path = "/checkin"
  function = "markdown"

[[edge_functions]]
  path = "/resources"
  function = "markdown"

[[edge_functions]]
  path = "/professionals"
  function = "markdown"

[[edge_functions]]
  path = "/request_access"
  function = "markdown"

[[edge_functions]]
  path = "/join_provider"
  function = "markdown"

[[edge_functions]]
  path = "/join_sponsor"
  function = "markdown"

[[edge_functions]]
  path = "/legal"
  function = "markdown"

[[edge_functions]]
  path = "/legal/*"
  function = "markdown"
