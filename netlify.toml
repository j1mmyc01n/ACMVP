# netlify.toml
# Fixes the /checkin 404 on page reload — React SPA routing

[build]
  command = "npm run build --workspace=apps/web"
  publish = "apps/web/dist"
  functions = "apps/web/netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Raise timeout on the provisioning function — Supabase Management API can be
# slow on cold starts.  26 s is the maximum for synchronous Netlify functions.
[functions."provision-location"]
  timeout = 26

[functions]
  directory = "apps/web/netlify/functions"

# SPA catch-all redirect — CRITICAL for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Never cache index.html — ensures browsers always fetch the latest deploy entry point
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache the service worker — ensures browsers always detect new SW versions
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache the workbox runtime — it is imported by sw.js and must stay in sync
[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

# Cache hashed assets forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Markdown-for-AI Edge Function ─────────────────────────────────────────────
# These paths serve Markdown when the request includes `Accept: text/markdown`.
# Anything else (regular browser, JSON API client, asset request) is passed
# through to the origin unchanged. To extend coverage, add another
# `[[edge_functions]]` block below with the desired path. To remove a route,
# delete its block or add the path to `EXCLUDED_PATHS` in the edge function.
[[edge_functions]]
  path = "/"
  function = "markdown"

[[edge_functions]]
  path = "/checkin"
  function = "markdown"

[[edge_functions]]
  path = "/resources"
  function = "markdown"

[[edge_functions]]
  path = "/professionals"
  function = "markdown"

[[edge_functions]]
  path = "/request_access"
  function = "markdown"

[[edge_functions]]
  path = "/join_provider"
  function = "markdown"

[[edge_functions]]
  path = "/join_sponsor"
  function = "markdown"

[[edge_functions]]
  path = "/legal"
  function = "markdown"

[[edge_functions]]
  path = "/legal/*"
  function = "markdown"
