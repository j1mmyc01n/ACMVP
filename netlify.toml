# netlify.toml
# Fixes the /checkin 404 on page reload — React SPA routing

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA catch-all redirect — CRITICAL for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Never cache index.html — ensures browsers always fetch the latest deploy entry point
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache the service worker — ensures browsers always detect new SW versions
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache the workbox runtime — it is imported by sw.js and must stay in sync
[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

# Cache hashed assets forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
