name: Deploy Acute Connect

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Check Netlify secrets
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_TOKEN secret is not set. Add it at Settings → Secrets → Actions."
            exit 1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID secret is not set. Add it at Settings → Secrets → Actions."
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify
        run: npx --yes netlify-cli@latest deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
